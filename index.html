<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/psymind.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PsyMind.AI: Solução educativa de apoio emocional para estudantes. Compreenda suas emoções com ajuda da IA." />
    <meta name="theme-color" content="#f0f4f9" />
    
    <!-- Content Security Policy for XSS protection and violation reporting -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'; require-trusted-types-for 'script'; trusted-types default; report-uri /csp-violation-report;">
    
    <!-- Performance: Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    
    <!-- Small external script to prevent theme flash (FOUC) -->
    <script src="/theme-init.js"></script>
    <!-- Safe service worker registration (handles failures and secure-context checks) -->
    <script src="/register-sw-safe.js" defer></script>

    <!-- Google Fonts with font-display: swap -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;family=Outfit:wght@300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
      crossorigin="anonymous"
    />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PsyMind.AI - Apoio Emocional Educativo" />
    <meta property="og:description" content="Inteligência Artificial para apoio emocional e educativo de estudantes." />
    <meta property="og:image" content="https://psymind.ai/psymind.svg" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PsyMind.AI - Apoio Emocional Educativo" />
    <meta name="twitter:description" content="Inteligência Artificial para apoio emocional e educativo de estudantes." />
    <meta name="twitter:image" content="https://psymind.ai/psymind.svg" />

    <!-- SEO: Canonical URL & Structured Data Consolidado -->
    <link rel="canonical" href="https://psymind.ai/" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://psymind.ai/#organization",
          "name": "PsyMind.AI",
          "url": "https://psymind.ai/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://psymind.ai/psymind.svg"
          },
          "description": "IA especializada em apoio emocional e organização de estudos para estudantes.",
          "sameAs": [
            "https://www.instagram.com/psymind.ai",
            "https://github.com/LeonZZlambda/PsyMindAI"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://psymind.ai/#website",
          "url": "https://psymind.ai/",
          "name": "PsyMind.AI",
          "description": "IA especializada em apoio emocional e organização de estudos para estudantes.",
          "publisher": { "@id": "https://psymind.ai/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://psymind.ai/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://psymind.ai/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "O PsyMind.AI substitui um psicólogo?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Não. O PsyMind.AI é uma ferramenta educativa de apoio emocional e organização de estudos. Ele não oferece diagnósticos clínicos nem substitui o acompanhamento de profissionais de saúde mental."
              }
            },
            {
              "@type": "Question",
              "name": "Como a IA ajuda na minha rotina de estudos?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nossa IA utiliza técnicas canônicas como Active Recall e Spaced Repetition para otimizar seu aprendizado, além de ajudar a identificar sinais de burnout e sugerir pausas estratégicas."
              }
            },
            {
              "@type": "Question",
              "name": "Meus dados e conversas são privados?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim. Priorizamos a privacidade. Você pode utilizar o chat de forma anônima e possui controle total sobre o histórico de conversas e dados de telemetria."
              }
            }
          ]
        },
        {
          "@type": "BreadcrumbList",
          "@id": "https://psymind.ai/#breadcrumb",
          "itemListElement": [{
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://psymind.ai/"
          }]
        }
      ]
    }
    </script>

    <title>PsyMind.AI - Apoio Emocional</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
