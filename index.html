<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/psymind.svg" />
    <!-- Preload principal logo for LCP -->
    <link rel="preload" as="image" href="/psymind.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="PsyMind.AI: Solução educativa de apoio emocional para estudantes. Compreenda suas emoções com ajuda da IA." />
    <meta name="theme-color" content="#f0f4f9" />
    
    <!-- Performance: Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Inline script to prevent theme flash (FOUC) -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('themeMode') || 'system';
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.style.backgroundColor = '#202124';
            document.documentElement.classList.add('dark-theme-init');
          } else {
            document.documentElement.style.backgroundColor = '#FFFFFF';
          }
        } catch (e) {}
      })();
    </script>

    <!-- Google Fonts with font-display: swap -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PsyMind.AI - Apoio Emocional Educativo" />
    <meta property="og:description" content="Inteligência Artificial para apoio emocional e educativo de estudantes." />
    <meta property="og:image" content="/psymind.svg" />

    <!-- SEO: Canonical URL & Structured Data -->
    <link rel="canonical" href="https://psymind.ai/" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PsyMind.AI",
        "url": "https://psymind.ai/",
        "description": "Solução educativa de apoio emocional para estudantes.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://psymind.ai/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <title>PsyMind.AI - Apoio Emocional</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
